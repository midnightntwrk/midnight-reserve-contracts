name: Submit Transaction

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        type: choice
        options:
          - mainnet
          - preprod
          - preview
          - qanet
          - govnet
          - devnet
      tx_file:
        description: 'Path to tx JSON on main (e.g. deployments/mainnet/change-federated-ops-tx.json)'
        required: true
        type: string
      witness_json:
        description: 'Combined witness JSON (array of TextEnvelope objects)'
        required: true
        type: string

permissions: {}

jobs:
  submit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate inputs
        id: validate
        env:
          NETWORK: ${{ inputs.network }}
          TX_FILE: ${{ inputs.tx_file }}
        run: |
          set -euo pipefail

          if [[ ! "$NETWORK" =~ ^(mainnet|preprod|preview|qanet|govnet|devnet)$ ]]; then
            echo "::error::Unknown network '${NETWORK}'"
            exit 1
          fi

          if [[ "$TX_FILE" == *..* ]] || [[ "$TX_FILE" == /* ]]; then
            echo "::error::tx_file must be a repo-relative path without '..'"
            exit 1
          fi
          if [[ ! "$TX_FILE" =~ ^deployments/[a-z0-9-]+/[A-Za-z0-9._/-]+\.json$ ]]; then
            echo "::error::tx_file must match 'deployments/<network>/<name>.json'"
            exit 1
          fi

          {
            echo "network=${NETWORK}"
            echo "tx_file=${TX_FILE}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Verify tx file exists on main
        env:
          TX_FILE: ${{ steps.validate.outputs.tx_file }}
        run: |
          set -euo pipefail
          if [[ ! -f "$TX_FILE" ]]; then
            echo "::error::tx_file '${TX_FILE}' not found on main. Is the governance PR merged?"
            exit 1
          fi

      - name: Resolve originating PR (for comment-back)
        id: pr
        env:
          TX_FILE: ${{ steps.validate.outputs.tx_file }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          COMMIT_SHA=$(git log --diff-filter=A --format=%H -n 1 -- "$TX_FILE")
          if [[ -z "$COMMIT_SHA" ]]; then
            echo "::warning::Could not resolve originating commit for ${TX_FILE}; skipping PR comment"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${COMMIT_SHA}/pulls" \
            --jq '.[] | select(.merged_at != null) | .number' | head -1)
          echo "pr_number=${PR_NUMBER:-}" >> "$GITHUB_OUTPUT"

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write witness files
        env:
          WITNESS_JSON: ${{ inputs.witness_json }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/witnesses

          WITNESS_COUNT=$(echo "$WITNESS_JSON" | jq 'length')
          echo "Writing ${WITNESS_COUNT} witness files..."

          for i in $(seq 0 $((WITNESS_COUNT - 1))); do
            echo "$WITNESS_JSON" | jq ".[$i]" > "/tmp/witnesses/witness-$(printf '%02d' $i).json"
            echo "  Wrote /tmp/witnesses/witness-$(printf '%02d' $i).json"
          done

      - name: Combine signatures and submit
        id: submit
        env:
          NETWORK: ${{ steps.validate.outputs.network }}
          TX_FILE: ${{ steps.validate.outputs.tx_file }}
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          BLOCKFROST_PREVIEW_API_KEY: ${{ secrets.BLOCKFROST_PREVIEW_API_KEY }}
          BLOCKFROST_PREPROD_API_KEY: ${{ secrets.BLOCKFROST_PREPROD_API_KEY }}
          BLOCKFROST_MAINNET_API_KEY: ${{ secrets.BLOCKFROST_MAINNET_API_KEY }}
        run: |
          set -euo pipefail
          echo "Submitting transaction from ${TX_FILE}..."
          bun run cli-yargs/index.ts combine-signatures \
            --network "${NETWORK}" \
            --tx "${TX_FILE}" \
            --signatures /tmp/witnesses/witness-*.json \
            --sign-deployer 2>&1 | tee /tmp/submit-output.txt

      - name: Comment on PR (success)
        if: success() && steps.pr.outputs.pr_number != ''
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          NETWORK: ${{ steps.validate.outputs.network }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OUTPUT=$(cat /tmp/submit-output.txt)
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(cat <<EOF
          ## Transaction Submitted

          **Network:** ${NETWORK}
          **Status:** Confirmed

          <details><summary>CLI output</summary>

          \`\`\`
          ${OUTPUT}
          \`\`\`

          </details>

          **Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )"

      - name: Comment on PR (failure)
        if: failure() && steps.pr.outputs.pr_number != ''
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          NETWORK: ${{ steps.validate.outputs.network }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OUTPUT=$(cat /tmp/submit-output.txt 2>/dev/null || echo "No output captured")
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(cat <<EOF
          ## Transaction Submission Failed

          **Network:** ${NETWORK}
          **Status:** Failed

          <details><summary>CLI output</summary>

          \`\`\`
          ${OUTPUT}
          \`\`\`

          </details>

          **Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )"
