name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  #v7.0.0
      - uses: aiken-lang/setup-aiken@1728a4be43be099752e22d8b841706caaa6fdd88  #v1.0.4
        with:
          version: v1.1.19
      - run: aiken fmt --check
      - run: aiken check
      - run: aiken build

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  #v2.0.2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run check
      - run: bun test
