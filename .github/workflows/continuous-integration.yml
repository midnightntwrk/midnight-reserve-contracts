name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  #v6.0.1
      - uses: aiken-lang/setup-aiken@c8a4cc81f420d1cf03776bc5367675f9a08582e6  #v1.0.3
        with:
          version: v1.1.19
      - run: aiken fmt --check
      - run: aiken check
      - run: aiken build
