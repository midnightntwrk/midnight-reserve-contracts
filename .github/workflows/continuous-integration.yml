name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  #v6.0.3
      - uses: aiken-lang/setup-aiken@c8a4cc81f420d1cf03776bc5367675f9a08582e6  #v1.0.3
        with:
          version: v1.1.19
      - run: aiken fmt --check
      - run: aiken check
      - run: aiken build

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  #v2.0.2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run check
      - run: bun test
