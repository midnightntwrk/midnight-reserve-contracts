name: Release Deployment Artifacts

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to publish artifacts for'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - mainnet
          - preprod
          - preview
          - qanet
          - govnet
          - devnet

permissions: {}

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # needed for creating releases/tags
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #v6.0.2

      - name: Validate network input
        id: validate
        run: |
          set -euo pipefail

          if [[ "$NETWORK" =~ [[:space:]/] ]] || [[ "$NETWORK" == *..* ]]; then
            echo "::error::Invalid network name '${NETWORK}': must not contain '/', '..', whitespace, or newlines"
            exit 1
          fi

          if [[ ! "$NETWORK" =~ ^(mainnet|preprod|preview|qanet|govnet|devnet)$ ]]; then
            echo "::error::Unknown network '${NETWORK}'. Allowed: mainnet, preprod, preview, qanet, govnet, devnet"
            exit 1
          fi

          echo "Network '${NETWORK}' is valid"
          echo "network=${NETWORK}" >> "$GITHUB_OUTPUT"
        env:
          NETWORK: ${{ inputs.network }}

      - name: Validate plutus.json exists
        run: |
          set -euo pipefail
          if [ ! -f "deployed-scripts/${NETWORK}/plutus.json" ]; then
            echo "::error::Missing deployed-scripts/${NETWORK}/plutus.json"
            exit 1
          fi
          echo "plutus.json found for network '${NETWORK}'"
        env:
          NETWORK: ${{ steps.validate.outputs.network }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run verification
        run: bun run cli-yargs/index.ts verify --network "$NETWORK"
        env:
          NETWORK: ${{ steps.validate.outputs.network }}
          BLOCKFROST_PREVIEW_API_KEY: ${{ secrets.BLOCKFROST_PREVIEW_API_KEY }}
          BLOCKFROST_PREPROD_API_KEY: ${{ secrets.BLOCKFROST_PREPROD_API_KEY }}
          BLOCKFROST_MAINNET_API_KEY: ${{ secrets.BLOCKFROST_MAINNET_API_KEY }}

      - name: Generate contract info report
        run: bun run cli-yargs/index.ts info --network "$NETWORK" --save
        env:
          NETWORK: ${{ steps.validate.outputs.network }}
          BLOCKFROST_PREVIEW_API_KEY: ${{ secrets.BLOCKFROST_PREVIEW_API_KEY }}
          BLOCKFROST_PREPROD_API_KEY: ${{ secrets.BLOCKFROST_PREPROD_API_KEY }}
          BLOCKFROST_MAINNET_API_KEY: ${{ secrets.BLOCKFROST_MAINNET_API_KEY }}

      - name: Generate release tag
        id: tag
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=${NETWORK}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
        env:
          NETWORK: ${{ steps.validate.outputs.network }}

      - name: Check for existing release
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "::error::Release '${TAG}' already exists. Delete the existing release first or use a different commit."
            exit 1
          fi
          echo "No existing release for tag '${TAG}'"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          SHORT_SHA="${{ steps.tag.outputs.short_sha }}"

          TITLE="${NETWORK} Deployment Artifacts - ${SHORT_SHA}"

          {
            echo "# ${NETWORK} Deployment Artifacts"
            echo ""
            echo "**Commit:** ${GITHUB_SHA}"
            echo "**Network:** ${NETWORK}"
            echo ""
            echo "## Attached Artifacts"
            echo ""
            echo "- \`plutus.json\` — Compiled Plutus validators"
            echo "- \`verification-report.md\` — Deployment verification checks"
            echo "- \`address-report.md\` — Contract addresses and UTxO details"
            echo "- \`info.json\` — Structured contract information"
            echo ""
            echo "---"
            echo ""
            cat "release/${NETWORK}/address-report.md"
          } > /tmp/release-notes.md

          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes-file /tmp/release-notes.md \
            "deployed-scripts/${NETWORK}/plutus.json" \
            "release/${NETWORK}/verification-report.md" \
            "release/${NETWORK}/address-report.md" \
            "release/${NETWORK}/info.json"
        env:
          GH_TOKEN: ${{ github.token }}
          NETWORK: ${{ steps.validate.outputs.network }}
